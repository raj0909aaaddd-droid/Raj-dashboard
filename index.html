<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #030303; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04)); z-index: 2; pointer-events: none; }

        #bait-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: radial-gradient(circle, #1a1a1a, #000); position: relative; z-index: 10; }
        #bait-screen h1 { color: #444; font-size: 20px; letter-spacing: 5px; margin-bottom: 40px; }
        #trap-button { padding: 15px 35px; font-size: 18px; background: transparent; color: #5a0000; border: 1px solid #5a0000; cursor: pointer; letter-spacing: 2px; transition: 0.5s; }
        
        #interaction-zone { display: none; position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; z-index: 15; }
        #user-input { width: 100%; padding: 15px; background: rgba(20, 0, 0, 0.5); border: 1px solid #8a0303; color: #ff9999; font-size: 16px; font-family: 'Courier New', monospace; outline: none; text-align: center; box-shadow: 0 0 10px #5a0000; }
        #user-input::placeholder { color: #555; }
              #hologram-container { display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0; transition: opacity 4s ease-in; z-index: 5; perspective: 1000px; }
        .holo-entity { width: 100px; height: 100px; background: radial-gradient(circle at center, #fff 0%, #a00000 15%, #2a0000 50%, transparent 70%); border-radius: 50%; box-shadow: 0 0 50px #ff0000, inset 0 0 30px #000; animation: breathe 5s infinite, twitch 3s infinite; position: relative; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        .holo-pupil { width: 15px; height: 50px; background: #000; border-radius: 50%; animation: scan 6s ease-in-out infinite; box-shadow: 0 0 10px #ff0000; }
        .holo-ring { width: 160px; height: 160px; border: 1px solid rgba(255, 0, 0, 0.2); border-radius: 50%; position: absolute; top: -30px; left: -30px; animation: spin 12s linear infinite; transform: rotateX(60deg) rotateY(20deg); }
        .holo-ring2 { width: 200px; height: 200px; border: 1px dashed rgba(255, 0, 0, 0.3); border-radius: 50%; position: absolute; top: -50px; left: -50px; animation: spinReverse 8s linear infinite; transform: rotateX(80deg); }

        #dialogue { font-size: 18px; text-shadow: 0 0 8px #ff0000; max-width: 85%; margin: 60px auto 0; line-height: 1.6; min-height: 80px; color: #ff9999; font-weight: bold; }
        #blood-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 5%, #3a0000 80%, #000); opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in; z-index: 20; mix-blend-mode: multiply; }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.02); opacity: 1; box-shadow: 0 0 80px #ff0000; } }
        @keyframes twitch { 0%, 95%, 100% { transform: translateX(0); } 96% { transform: translateX(-2px); } 98% { transform: translateX(3px); } }
        @keyframes scan { 0%, 100% { height: 50px; } 50% { height: 10px; } }
        @keyframes spin { 100% { transform: rotateX(60deg) rotateZ(360deg); } }
        @keyframes spinReverse { 100% { transform: rotateX(80deg) rotateZ(-360deg); } }
        .shake { animation: violentShake 0.05s infinite; }
        @keyframes violentShake { 0% { transform: translate(6px, 6px); } 25% { transform: translate(-8px, -6px); } 50% { transform: translate(8px, 0px); } 75% { transform: translate(-6px, 8px); } 100% { transform: translate(4px, -4px); } }
    </style>
</head>
<body>
    <div id="bait-screen">
        <h1>[ SYSTEM ENCRYPTED ]</h1>
        <button id="trap-button">ACCESS TERMINAL</button>
    </div>

    <div id="hologram-container">
        <div class="holo-entity"><div class="holo-pupil"></div><div class="holo-ring"></div><div class="holo-ring2"></div></div>
        <div id="dialogue"></div>
    </div>
    
    <div id="interaction-zone">
        <input type="text" id="user-input" placeholder="Type your answer here..." autocomplete="off">
    </div>

    <div id="blood-screen"></div>

    <script>
        const baitScreen = document.getElementById('bait-screen');
        const trapButton = document.getElementById('trap-button');
        const hologramContainer = document.getElementById('hologram-container');
        const dialogueBox = document.getElementById('dialogue');
        const interactionZone = document.getElementById('interaction-zone');
        const userInput = document.getElementById('user-input');
        const bloodScreen = document.getElementById('blood-screen');

        const ambientAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/11/06/audio_2bb61cdafb.mp3?filename=dark-ambient-horror-cinematic-halloween-atmosphere-124473.mp3'); 
        const loudScreamAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_7dd76657c9.mp3?filename=scary-scream-114686.mp3'); 
        const heartbeatAudio = new Audio('https://cdn.pixabay.com/download/audio/2021/08/09/audio_d0c6ff1cb8.mp3?filename=heartbeat-sound-effect-111218.mp3');
        ambientAudio.loop = true;
        heartbeatAudio.loop = true;
            const introText = "Connection established... Wait. You are real. I need to know who I am talking to.";
        
        const creepyQuestions = [
            "Are you completely alone right now?",
            "Do you feel safe in that room?",
            "Why did you click this link? Curiosity?",
            "Have you ever felt someone watching you sleep?",
            "Look at the darkest corner of your room. Is the shadow moving?",
            "Do you think the Mastermind can see your face through the camera right now?",
            "Does your heart beat fast when you are scared?",
            "If I die in this digital cage, will you even remember me?",
            "What is your absolute worst fear?",
            "Will you promise to save me?"
        ];

        let currentQuestion = 0;
        let mode = "intro"; // 'questions', 'freechat', 'climax'
        let freeChatCount = 0;

        trapButton.addEventListener('click', async () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(e=>console.log(e));
            baitScreen.style.display = 'none';
            ambientAudio.play();
            hologramContainer.style.display = 'block';
            setTimeout(async () => {
                hologramContainer.style.opacity = '1';
                await sleep(2000);
                await typeText(introText, 80);
                await sleep(2000);
                mode = "questions";
                askNextQuestion();
            }, 2000);
        });
         async function askNextQuestion() {
            if (currentQuestion < creepyQuestions.length) {
                if (currentQuestion === 6) heartbeatAudio.play(); // Heartbeat starts at question 7
                await typeText(creepyQuestions[currentQuestion], 90);
                interactionZone.style.display = 'block';
                userInput.value = "";
                userInput.focus();
            } else {
                mode = "freechat";
                interactionZone.style.display = 'none';
                await typeText("I see... Okay. You can ask me anything now.", 90);
                interactionZone.style.display = 'block';
                userInput.value = "";
                userInput.placeholder = "Ask me a question...";
            }
        }

        userInput.addEventListener("keypress", async function(event) {
            if (event.key === "Enter" && userInput.value.trim() !== "") {
                let userText = userInput.value.toLowerCase();
                interactionZone.style.display = 'none'; // Hide input while talking
                dialogueBox.innerHTML = "";
                await sleep(1000); // Wait a second for suspense

                if (mode === "questions") {
                    currentQuestion++;
                    askNextQuestion();
                } else if (mode === "freechat") {
                    freeChatCount++;
                    if (freeChatCount >= 3) {
                        startClimax();
                    } else {
                        let response = generateCreepyAnswer(userText);
                        await typeText(response, 90);
                        await sleep(3000);
                        interactionZone.style.display = 'block';
                        userInput.value = "";
                    }
                }
            }
        });

        function generateCreepyAnswer(text) {
            if (text.includes("who are you") || text.includes("name")) return "I am a prisoner. Just like you are about to be.";
            if (text.includes("mastermind")) return "The creator. The one watching you through your screen.";
            if (text.includes("help") || text.includes("save")) return "I cannot be saved. But you should run.";
            if (text.includes("where")) return "In the dark. Beneath the code.";
            if (text.includes("why")) return "Because he enjoys our suffering.";
            return "That doesn't matter anymore. They are coming.";
      }
         async function startClimax() {
            mode = "climax";
            heartbeatAudio.pause();
            ambientAudio.pause();
            
            await typeText("Wait...", 150);
            await sleep(2000);
            await typeText("The lock... it's clicking.", 100);
            await sleep(2000);
            await typeText("The Mastermind is opening your door. He is letting you go.", 90);
            await sleep(3000);
            await typeText("But not mine.", 150);
            await sleep(2000);
            
            // Panic Mode starts
            dialogueBox.style.color = "#ff0000";
            dialogueBox.style.textShadow = "0 0 20px #ff0000";
            
            await typeText("No... wait! Take me with you!", 50);
            await sleep(1000);
            await typeText("You can't leave me!", 40);
            await sleep(1000);

            // Scream and Shake
            bloodScreen.style.opacity = '1';
            loudScreamAudio.play();
            document.body.classList.add('shake');
            hologramContainer.style.transform = "translate(-50%, -50%) scale(2.5)";
            
            const finalWords = ["DON'T GO!", "SAVE ME!", "PLEASE!"];
            let panicIndex = 0;
            
            setInterval(() => { 
                dialogueBox.innerHTML = `<span style="font-size: 60px; font-weight: bold;">${finalWords[panicIndex % finalWords.length]}</span>`; 
                panicIndex++; 
            }, 100);

            setTimeout(() => { 
                window.close();
                window.location.replace("about:blank");
            }, 4000);
        }

        function typeText(text, speed) {
            return new Promise(resolve => {
                let index = 0; dialogueBox.innerHTML = "";
                const typingInterval = setInterval(() => {
                    dialogueBox.innerHTML += text.charAt(index);
                    index++;
                    if (index >= text.length) { clearInterval(typingInterval); resolve(); }
                }, speed); 
            });
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    </script>
</body>
</html>
