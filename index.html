<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAJ.SYS // Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root { --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --accent: #00f5d4; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; background: radial-gradient(circle at 0% 0%, #111 0%, #050505 100%); }
        nav { width: 80px; background: var(--glass); border-right: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .logo { font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 40px; transform: rotate(-90deg); white-space: nowrap; }
        .nav-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; color: #555; font-size: 20px; border: 1px solid transparent; }
        .nav-item.active { background: var(--glass); color: var(--accent); border-color: var(--border); }
    </style>
    <style>
        main { flex: 1; padding: 25px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-bar { background: var(--glass); border: 1px solid var(--border); padding: 12px 18px; border-radius: 12px; width: 220px; color: white; font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } nav { width: 200px; align-items: flex-start; padding: 30px 20px; } .logo { transform: none; margin-bottom: 50px; font-size: 22px; } .nav-item { width: 100%; justify-content: flex-start; padding: 0 15px; font-size: 16px; } .search-bar { width: 350px; } }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        .card h3 { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card .value { font-size: 28px; font-weight: 800; color: #fff; }
        .chart-container { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 24px; height: 300px; position: relative; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">RAJ.SYS //</div>
        <div class="nav-item active">● Dashboard</div>
        <div class="nav-item">○ Nodes</div>
        <div class="nav-item">○ Security</div>
    </nav>
    <main>
        <header>
            <h2 style="font-weight: 800;">Overview</h2>
            <input type="text" class="search-bar" placeholder="Command + K">
        </header>
           <div class="stats-grid">
            <div class="card">
                <h3>Revenue</h3>
                <div class="value" id="stat1">$0</div>
            </div>
            <div class="card">
                <h3>Live Nodes</h3>
                <div class="value" id="stat2">0</div>
            </div>
            <div class="card">
                <h3>Uptime</h3>
                <div class="value" id="stat3">0%</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </main>
     <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['12am', '4am', '8am', '12pm', '4pm', '8pm'],
                datasets: [{
                    data: [30, 45, 32, 60, 55, 85],
                    borderColor: '#00f5d4',
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 245, 212, 0.05)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#444' } }
                }
            }
        });

        gsap.to("#stat1", { innerText: 12450, duration: 2, snap: { innerText: 1 }, onUpdate: function() {
            document.getElementById("stat1").innerHTML = "$" + Math.floor(this.targets()[0].innerText).toLocaleString();
        }});
        gsap.to("#stat2", { innerText: 42, duration: 1.5, snap: { innerText: 1 } });
        gsap.to("#stat3", { innerText: 99.9, duration: 2.5, snap: { innerText: 0.1 }, onUpdate: function() {
            document.getElementById("stat3").innerHTML = this.targets()[0].innerText + "%";
        }});
    </script>
</body>
</html>
