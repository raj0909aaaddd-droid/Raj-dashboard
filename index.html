<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Procedural Spine - Touch & Mouse</title>
    <style>
        /* 1. Reset and styling */
        body {
            margin: 0;
            height: 100vh;
            background-color: #050505; /* Dark background */
            overflow: hidden;
            
            /* Hides the default computer mouse pointer */
            cursor: none; 
            
            /* Prevents touch highlighting on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        /* 2. Styling for the individual spine segments */
        .segment {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            /* Prevents the generated divs from blocking the touch/mouse tracking */
            pointer-events: none; 
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <script>
        // 3. Configuration variables
        const numSegments = 30;      // How long the spine is
        const headSize = 15;         // Size of the leading segment
        const spacing = 10;          // Distance between each segment

        const segments = [];
        
        // 4. Create the HTML elements for the body dynamically
        for (let i = 0; i < numSegments; i++) {
            const el = document.createElement('div');
            el.className = 'segment';
            
            // Math to make the tail taper off and get smaller at the end
            const size = headSize * (1 - (i / numSegments)) + 2;
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            
            document.body.appendChild(el);
            
            // Store the element and its current X/Y coordinates
            segments.push({ 
                el: el, 
                x: window.innerWidth / 2, 
                y: window.innerHeight / 2 
            });
        }

        // 5. Input tracking logic (Mouse AND Mobile Touch)
        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 2;

        // Desktop Mouse Support
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        // Mobile Touch Support: Updates target when you tap the screen
        window.addEventListener('touchstart', (e) => {
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        });

        // Mobile Touch Support: Updates target when you drag your finger
        window.addEventListener('touchmove', (e) => {
            // This stops the phone browser from scrolling the page
            e.preventDefault(); 
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        // 6. The Animation Loop (Inverse Kinematics)
        function animate() {
            // The head (segment 0) smoothly interpolates toward the target coordinates
            segments[0].x += (targetX - segments[0].x) * 0.4;
            segments[0].y += (targetY - segments[0].y) * 0.4;
            segments[0].el.style.left = `${segments[0].x}px`;
            segments[0].el.style.top = `${segments[0].y}px`;

            // The rest of the body follows the segment immediately in front of it
            for (let i = 1; i < numSegments; i++) {
                const prev = segments[i - 1];
                const curr = segments[i];

                // Calculate the distance and angle between the current and previous segment
                const dx = prev.x - curr.x;
                const dy = prev.y - curr.y;
                const angle = Math.atan2(dy, dx);

                // Lock the current segment at the strict 'spacing' distance along that angle
                curr.x = prev.x - Math.cos(angle) * spacing;
                curr.y = prev.y - Math.sin(angle) * spacing;

                // Update the DOM element's position
                curr.el.style.left = `${curr.x}px`;
                curr.el.style.top = `${curr.y}px`;
            }

            // Call the function again at 60 FPS
            requestAnimationFrame(animate);
        }

        // Start the engine
        animate();
    </script>
</body>
</html>
