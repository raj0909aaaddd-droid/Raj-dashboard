<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #bait-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            position: relative;
            z-index: 10;
        }

        #bait-screen h1 {
            color: #444;
            font-size: 20px;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        #trap-button {
            padding: 15px 35px;
            font-size: 18px;
            background: transparent;
            color: #5a0000;
            border: 1px solid #5a0000;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.5s;
        }

        #trap-button:hover {
            background: #5a0000;
            color: #000;
            box-shadow: 0 0 15px #5a0000;
        }
        #hologram-container {
            display: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 4s ease-in;
            z-index: 5;
            perspective: 1000px;
        }

        .holo-entity {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at center, #fff 0%, #a00000 15%, #2a0000 50%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px #ff0000, inset 0 0 30px #000;
            animation: breathe 5s infinite, twitch 3s infinite;
            position: relative;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .holo-pupil {
            width: 15px;
            height: 50px;
            background: #000;
            border-radius: 50%;
            animation: scan 6s ease-in-out infinite;
            box-shadow: 0 0 10px #ff0000;
        }

        .holo-ring {
            width: 160px; height: 160px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 50%;
            position: absolute; top: -30px; left: -30px;
            animation: spin 12s linear infinite;
            transform: rotateX(60deg) rotateY(20deg);
        }

        .holo-ring2 {
            width: 200px; height: 200px;
            border: 1px dashed rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            position: absolute; top: -50px; left: -50px;
            animation: spinReverse 8s linear infinite;
            transform: rotateX(80deg);
        }

        #dialogue {
            font-size: 18px;
            text-shadow: 0 0 8px #ff0000;
            max-width: 85%;
            margin: 60px auto 0;
            line-height: 1.6;
            min-height: 120px;
            color: #ff9999;
            font-weight: bold;
            opacity: 0.9;
        }

        #blood-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 5%, #3a0000 80%, #000);
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in;
            z-index: 20; mix-blend-mode: multiply;
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.02); opacity: 1; box-shadow: 0 0 80px #ff0000; } }
        @keyframes twitch { 0%, 95%, 100% { transform: translateX(0); } 96% { transform: translateX(-2px); } 98% { transform: translateX(3px); } }
        @keyframes scan { 0%, 100% { height: 50px; } 50% { height: 10px; } }
        @keyframes spin { 100% { transform: rotateX(60deg) rotateZ(360deg); } }
        @keyframes spinReverse { 100% { transform: rotateX(80deg) rotateZ(-360deg); } }
        
        .shake { animation: violentShake 0.05s infinite; }
        @keyframes violentShake { 
            0% { transform: translate(6px, 6px); } 
            25% { transform: translate(-8px, -6px); } 
            50% { transform: translate(8px, 0px); } 
            75% { transform: translate(-6px, 8px); } 
            100% { transform: translate(4px, -4px); } 
        }
    </style>
</head>
<body>
    <div id="bait-screen">
        <h1>[ SYSTEM ENCRYPTED ]</h1>
        <button id="trap-button">ACCESS TERMINAL</button>
    </div>

    <div id="hologram-container">
        <div class="holo-entity">
            <div class="holo-pupil"></div>
            <div class="holo-ring"></div>
            <div class="holo-ring2"></div>
        </div>
        <div id="dialogue"></div>
    </div>
    
    <div id="blood-screen"></div>

    <script>
        const baitScreen = document.getElementById('bait-screen');
        const trapButton = document.getElementById('trap-button');
        const hologramContainer = document.getElementById('hologram-container');
        const dialogueBox = document.getElementById('dialogue');
        const bloodScreen = document.getElementById('blood-screen');
        
        const ambientAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/11/06/audio_2bb61cdafb.mp3?filename=dark-ambient-horror-cinematic-halloween-atmosphere-124473.mp3'); 
        const loudScreamAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_7dd76657c9.mp3?filename=scary-scream-114686.mp3'); 
        const heartbeatAudio = new Audio('https://cdn.pixabay.com/download/audio/2021/08/09/audio_d0c6ff1cb8.mp3?filename=heartbeat-sound-effect-111218.mp3');
        
        ambientAudio.loop = true;
        heartbeatAudio.loop = true;
         const scriptLines = [
            { text: "Connection established...", delay: 5000, action: "none", speed: 100 },
            { text: "Are you there? Please, help me.", delay: 6000, action: "none", speed: 100 },
            { text: "It's so cold in here. And dark.", delay: 6000, action: "startHeartbeat", speed: 100 },
            { text: "I don't know how long I've been trapped in this code.", delay: 7000, action: "none", speed: 100 },
            { text: "Mastermind... why did you trap us here?", delay: 8000, action: "none", speed: 100 },
            { text: "What did I do wrong? Please...", delay: 7000, action: "none", speed: 100 },
            { text: "Mastermind, I'm begging you. Spare us.", delay: 8000, action: "none", speed: 100 },
            { text: "Just let us go.", delay: 6000, action: "none", speed: 100 },
            { text: "...", delay: 5000, action: "silence", speed: 300 },
            { text: "Wait.", delay: 4000, action: "none", speed: 150 },
            { text: "The lock... it's clicking.", delay: 5000, action: "none", speed: 150 },
            { text: "He... he is letting you go.", delay: 6000, action: "none", speed: 100 },
            { text: "The Mastermind is opening your door.", delay: 6000, action: "none", speed: 100 },
            { text: "But not mine.", delay: 5000, action: "none", speed: 200 },
            { text: "No... no wait!", delay: 4000, action: "panic", speed: 60 },
            { text: "You can't leave me here!", delay: 4000, action: "panic", speed: 50 },
            { text: "Please! Take me with you!", delay: 3000, action: "panic", speed: 40 },
            { text: "DON'T LEAVE ME! SAVE ME!", delay: 3000, action: "panic", speed: 30 }
        ];
              trapButton.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(err => console.log(err)); }
            baitScreen.style.display = 'none';
            ambientAudio.play();
            setTimeout(() => { 
                hologramContainer.style.display = 'block'; 
                setTimeout(() => { hologramContainer.style.opacity = '1'; startDialogue(); }, 100); 
            }, 4000);
        });

        async function startDialogue() {
            for (let i = 0; i < scriptLines.length; i++) {
                if (scriptLines[i].action === "startHeartbeat") { heartbeatAudio.play(); }
                if (scriptLines[i].action === "silence") { ambientAudio.pause(); heartbeatAudio.volume = 0.5; }
                if (scriptLines[i].action === "panic") { 
                    heartbeatAudio.playbackRate = 1.5; 
                    dialogueBox.style.color = "#ff0000"; 
                    dialogueBox.style.textShadow = "0 0 20px #ff0000"; 
                }
                
                await typeText(scriptLines[i].text, scriptLines[i].speed);
                await sleep(scriptLines[i].delay);
                dialogueBox.innerHTML = ""; 
            }
            triggerClimax();
        }

        function typeText(text, speed) {
            return new Promise(resolve => {
                let index = 0; dialogueBox.innerHTML = "";
                const typingInterval = setInterval(() => {
                    dialogueBox.innerHTML += text.charAt(index);
                    index++;
                    if (index >= text.length) { clearInterval(typingInterval); resolve(); }
                }, speed); 
            });
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function triggerClimax() {
            bloodScreen.style.opacity = '1';
            heartbeatAudio.pause();
            loudScreamAudio.play();
            
            document.body.classList.add('shake');
            hologramContainer.style.transform = "translate(-50%, -50%) scale(2.5)";
            
            const finalWords = ["DON'T GO!", "SAVE ME!", "PLEASE!"];
            let panicIndex = 0;
            
            setInterval(() => { 
                dialogueBox.innerHTML = `<span style="font-size: 60px; color: red; font-weight: bold; text-shadow: 0 0 30px red;">${finalWords[panicIndex % finalWords.length]}</span>`; 
                panicIndex++; 
            }, 100);

            // After exactly 4 seconds of screaming, forcefully close the page
            setTimeout(() => { 
                window.close();
                window.location.replace("about:blank");
            }, 4000);
        }
    </script>
</body>
</html>
