<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 0: A Quiet Moment</title>
    <style>
        /* Base Reset & Manhwa Vibe */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* The Canvas for the Cherry Blossoms */
        #blossom-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Lets you click/scroll right through it */
            z-index: 10;
        }

        /* Scroll Panels */
        .panel {
            position: relative;
            width: 100%;
            height: 150vh; /* Extremely tall to force scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Creates the Parallax 3D depth effect */
        }

        /* Placeholders for your 3D renders */
        #panel-1 { background-image: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.8)), url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2000&auto=format&fit=crop'); }
        #panel-2 { background-image: linear-gradient(rgba(10,10,10,0.5), rgba(10,10,10,0.9)), url('https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?q=80&w=2000&auto=format&fit=crop'); }
        #panel-3 { background-color: #050505; height: 100vh; justify-content: center;}

        /* Text Bubbles */
        .bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            padding: 20px 30px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 1.2rem;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            opacity: 0; /* Hidden by default */
            transform: translateY(50px); /* Pushed down slightly */
            transition: all 1s ease-out; /* Smooth fade in */
            margin: 40vh 0; /* Huge vertical margins to control reading pace */
        }

        /* Left and Right alignments for Panel 2 */
        .align-left { align-self: flex-start; margin-left: 10%; margin-top: 20vh; }
        .align-right { align-self: flex-end; margin-right: 10%; margin-top: 10vh; }

        /* The class added by JavaScript when scrolled into view */
        .bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Emphasized text */
        .highlight {
            font-size: 1.5rem;
            font-weight: bold;
            background: none;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <canvas id="blossom-canvas"></canvas>

    <div class="panel" id="panel-1">
        <div class="bubble" style="margin-top: 60vh;">Every great story has to start somewhere...</div>
    </div>

    <div class="panel" id="panel-2">
        <div class="bubble align-left">...but before the adventure begins,</div>
        <div class="bubble align-right">...we have to make sure the world actually works.</div>
    </div>

    <div class="panel" id="panel-3">
        <div class="bubble highlight">Welcome to the test run, Romisaa.</div>
        <div class="bubble" style="background: transparent; color: #666; box-shadow: none; font-size: 0.9rem; margin-top: 20vh;">
            Chapter 1 loading... (Whenever Raj finishes building it.)
        </div>
    </div>

    <script>
        // --- 1. SCROLL FADE-IN LOGIC ---
        // This watches the text bubbles and reveals them when they enter the screen
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.5 }); // Triggers when 50% of the bubble is visible

        document.querySelectorAll('.bubble').forEach(bubble => {
            observer.observe(bubble);
        });

        // --- 2. CHERRY BLOSSOM PARTICLE LOGIC ---
        const canvas = document.getElementById('blossom-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const numberOfParticles = 50;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 2 + 1;
                // Soft pink colors for blossoms
                this.color = `rgba(255, 183, 197, ${Math.random() * 0.8 + 0.2})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Reset particle to the top if it falls off the bottom
                if (this.y > canvas.height) {
                    this.y = 0 - this.size;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Resize canvas if window changes
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
  </html>
